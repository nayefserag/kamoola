version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: kamoola-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - manga-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kamoola-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/kamoola
      - PORT=3001
      - CORS_ORIGIN=http://localhost
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_EXPIRATION=7d
    networks:
      - manga-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kamoola-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - manga-network

volumes:
  mongodb_data:
    driver: local

networks:
  manga-network:
    driver: bridge
